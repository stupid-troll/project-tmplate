name: docs-build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dev dependencies
        run: poetry install --no-root

      - name: Build MkDocs sites (strict)
        env:
          MATERIAL_DISABLE_ANNOUNCEMENTS: "1"
        run: |
          poetry run mkdocs build -f mkdocs.yml --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
